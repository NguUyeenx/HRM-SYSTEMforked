# Database Configuration
# MySQL Connection Settings (XAMPP)

db.url=jdbc:mysql://localhost:3306/hrm_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
db.username=root
db.password=

# Connection Pool Settings (HikariCP)
db.pool.size=10
db.pool.minIdle=5
db.pool.connectionTimeout=30000
db.pool.idleTimeout=600000
db.pool.maxLifetime=1800000

# Security Settings
security.maxFailedAttempts=5
security.lockoutDurationMinutes=30
security.passwordMinLength=8
security.sessionTimeoutMinutes=60
